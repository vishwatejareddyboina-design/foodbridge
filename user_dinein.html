<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Dine-In Live Seats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .dash-header-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 24px; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 600px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 16px; }
        
        .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; color: #0f172a; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .back-btn:hover { background: #e2e8f0; }
        
        .page-title { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0; }
        
        .web-container { max-width: 600px; margin: 24px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; padding-bottom: 100px; }
        
        .dinein-card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; transition: 0.2s; position: relative; overflow: hidden; }
        .dinein-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        
        .hotel-name { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin: 0 0 4px 0; }
        .hotel-address { color: #64748b; font-size: 0.9rem; margin: 0 0 20px 0; display: flex; align-items: center; gap: 4px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .stat-box { background: #f8fafc; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #f1f5f9; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin-bottom: 4px; }
        .stat-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .stat-available .stat-value { color: #10b981; }
        .stat-full .stat-value { color: #ef4444; }
        
        .live-badge { position: absolute; top: 24px; right: 24px; background: #fee2e2; color: #ef4444; font-size: 0.75rem; font-weight: 800; padding: 4px 12px; border-radius: 100px; display: flex; align-items: center; gap: 6px; letter-spacing: 0.5px; animation: pulse 2s infinite; }
        .live-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        #loadingMsg { text-align: center; color: #64748b; font-weight: 600; padding: 40px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header class="dash-header-web">
        <div class="header-content">
            <a href="user_dashboard.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="page-title">Live Dine-In Seats</h1>
        </div>
    </header>

    <main class="web-container">
        <div id="loadingMsg">Fetching live seat data...</div>
        <div id="dineInList"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user_dashboard.html" class="nav-item user-nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="user_orders.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span>Orders</span>
        </a>
        <a href="user_alerts.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span>Alerts</span>
        </a>
        <a href="user_settings.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!SessionManager.isLoggedIn()) {
                window.location.href = 'login_user.html';
                return;
            }
            loadDineInData();
        });

        async function loadDineInData() {
            const list = document.getElementById('dineInList');
            const loading = document.getElementById('loadingMsg');
            
            try {
                const response = await apiCall('get_all_dine_in.php', {});
                if (response.status === 'success') {
                    list.innerHTML = '';
                    if (!response.data || response.data.length === 0) {
                        loading.style.display = 'block';
                        loading.textContent = "No live dine-in data available right now.";
                        return;
                    }
                    loading.style.display = 'none';

                    response.data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'dinein-card';
                        card.style.cursor = 'pointer';
                        
                        card.onclick = () => {
                            sessionStorage.setItem('currentDineInHotel', JSON.stringify(item));
                            window.location.href = 'user_dinein_detail.html';
                        };

                        card.innerHTML = `
                            <div class="live-badge"><div class="live-dot"></div> LIVE</div>
                            <h2 class="hotel-name">${item.hotel_name || "Hotel"}</h2>
                            <p class="hotel-address">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                ${item.hotel_address || "Location unavailable"}
                            </p>
                            <div style="color: #3b82f6; font-size: 0.9rem; font-weight: 700; margin-top: 12px; display: flex; align-items: center; gap: 4px;">
                                View Live Status 
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><polyline points="9 18 15 12 9 6"></polyline></svg>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                } else {
                    loading.textContent = 'Failed to load dine-in data.';
                }
            } catch (e) {
                loading.textContent = 'Network Error.';
            }
        }
    </script>
</body>
</html>
