<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Manage Dine-In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .dash-header-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 30px 24px; display: flex; justify-content: center; }
        .header-content { max-width: 1000px; width: 100%; display: flex; align-items: center; gap: 16px; }
        
        .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; color: #0f172a; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .back-btn:hover { background: #e2e8f0; }
        
        .page-title { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; }
        
        .web-container { max-width: 1000px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .dinein-card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; max-width: 600px; margin: 0 auto; }
        
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 0.95rem; font-weight: 700; color: #334155; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .form-input:focus { border-color: #10b981; }
        
        .btn-update { background: #10b981; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 16px; }
        .btn-update:hover { background: #059669; box-shadow: 0 4px 12px rgba(16,185,129,0.2); }
        
        .btn-clear { background: #fee2e2; color: #ef4444; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; margin-top: 16px; }
        .btn-clear:hover { background: #fecaca; }
        
        @media (max-width: 768px) {
            .dinein-card { padding: 24px; }
            .web-container { padding-bottom: 100px; }
        }
    </style>
</head>
<body>

    <header class="dash-header-web">
        <div class="header-content">
            <a href="hotel_dashboard_home.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="page-title">Manage Dine-In</h1>
        </div>
    </header>

    <main class="web-container pb-nav">
        <div class="dinein-card">
            
            <div class="form-group">
                <label class="form-label">Total Dine-In Places</label>
                <input type="number" id="totalPlaces" class="form-input" placeholder="e.g. 50">
            </div>
            
            <div class="form-group">
                <label class="form-label">Places Currently In Use</label>
                <input type="number" id="placesInUse" class="form-input" placeholder="e.g. 20">
            </div>
            
            <div class="form-group">
                <label class="form-label">Max Time to Clear Crowd (mins)</label>
                <input type="number" id="maxTime" class="form-input" placeholder="e.g. 45">
            </div>

            <button class="btn-update" onclick="updateDineIn()">UPDATE DINE-IN STATUS</button>
            <button class="btn-clear" onclick="clearDineIn()">CLEAR / STOP DINE-IN TRACKING</button>
            
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="hotel_dashboard_home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="hotel_dashboard_food.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20.5L20.5 11a2.828 2.828 0 1 0-4-4L7 16.5M14 6l4 4M2 22l4-4M2 12l4-4M12 2l4 4"></path></svg>
            <span>Food</span>
        </a>
        <a href="hotel_dashboard_donations.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span>Donations</span>
        </a>
        <a href="hotel_dashboard_settings.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Settings</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        let hotelUser = null;

        document.addEventListener('DOMContentLoaded', async () => {
            hotelUser = SessionManager.getUser();
            if (!hotelUser || hotelUser.role !== 'hotel') {
                window.location.href = 'login_hotel.html';
                return;
            }
            loadCurrentStatus();
        });

        async function loadCurrentStatus() {
            try {
                const response = await apiCall('get_hotel_dine_in.php', { hotel_id: hotelUser.id });
                if (response.status === 'success' && response.data) {
                    document.getElementById('totalPlaces').value = response.data.total_places || '';
                    document.getElementById('placesInUse').value = response.data.in_use || '';
                    document.getElementById('maxTime').value = response.data.max_clear_time_mins || '';
                }
            } catch (e) {
                console.error("No active dine-in data or network error");
            }
        }

        async function updateDineIn() {
            const total = document.getElementById('totalPlaces').value;
            const inUse = document.getElementById('placesInUse').value;
            const maxTime = document.getElementById('maxTime').value;

            if (!total || !inUse || !maxTime) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                const response = await apiCall('update_dine_in.php', {
                    hotel_id: hotelUser.id,
                    total_places: parseInt(total),
                    in_use: parseInt(inUse),
                    max_clear_time: parseInt(maxTime)
                });
                
                if (response.status === 'success') {
                    alert("Dine-In status updated successfully!");
                } else {
                    alert(response.message || "Failed to update status.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }

        async function clearDineIn() {
            if (!confirm("Are you sure you want to stop tracking Dine-In capacity?")) return;

            try {
                const response = await apiCall('delete_dine_in.php', {
                    hotel_id: hotelUser.id
                });
                
                if (response.status === 'success') {
                    document.getElementById('totalPlaces').value = '';
                    document.getElementById('placesInUse').value = '';
                    document.getElementById('maxTime').value = '';
                    alert("Dine-In tracking cleared.");
                } else {
                    alert(response.message || "Failed to clear status.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }
    </script>
</body>
</html>
