<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body scrollable">
    <div class="register-header">
        <button class="back-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
    </div>

    <div class="auth-content" style="margin-top: 20px;">
        <h1 class="auth-title">Change Password</h1>
        <p class="auth-subtitle">Enter your new password below.</p>

        <form class="auth-form" action="#" onsubmit="event.preventDefault(); window.location.href='login_hotel.html';" style="margin-top: 40px;">
            <div class="input-group">
                <div class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <input type="password" placeholder="New Password" required>
            </div>

            <div class="input-group">
                <div class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </div>
                <input type="password" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="auth-btn" id="btnSubmit">Save Password</button>
        </form>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('changeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            // Simple demo using 'user' role by default, or could be extracted from local storage if logged in
            // For now, let's just assume we want to reset a 'user' password.
            const data = {
                role: 'user', // We might need to store the role during forgot_password.html
                email: localStorage.getItem('resetEmail') || 'test@test.com',
                new_password: document.getElementById('password').value
            };

            const response = await apiCall('forgot_password.php', data);
            
            if (response.status === 'success') {
                showToast('Password updated successfully!');
                window.location.href = 'choose_role.html';
            } else {
                showToast(response.message, true);
                btn.textContent = 'Save Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
