name: Selenium Web E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      working-directory: ./selenium_tests
      run: npm install

    - name: Run Selenium Tests
      working-directory: ./selenium_tests
      run: node run_tests.js

    - name: Upload Excel Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Selenium-E2E-Report
        path: ./selenium_tests/*.json
