<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Available Donations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Top Web Navigation */
        .top-nav-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 40px; height: 80px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; color: #ea580c; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-link { color: #64748b; font-weight: 600; text-decoration: none; font-size: 1rem; transition: 0.2s; padding: 8px 12px; border-radius: 8px; }
        .nav-link:hover { color: #ea580c; background: #fff7ed; }
        .nav-link.active { color: #ea580c; background: #ffedd5; font-weight: 700; }
        
        .user-profile-btn { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 8px 16px; border-radius: 100px; text-decoration: none; color: #0f172a; font-weight: 700; transition: 0.2s; cursor: pointer; border: none; }
        .user-profile-btn:hover { background: #e2e8f0; }
        
        /* Main Container */
        .web-container { max-width: 1200px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .page-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; }
        .page-subtitle { color: #64748b; font-size: 1.1rem; margin-top: 8px; }
        
        /* Grid Layout */
        .donations-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
        
        .donation-card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.2s; }
        .donation-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); border-color: #cbd5e1; }
        
        .card-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
        .icon-wrapper { width: 56px; height: 56px; border-radius: 14px; background: #dcfce7; color: #10b981; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        
        .donation-title { font-size: 1.4rem; font-weight: 800; color: #0f172a; margin: 0 0 4px 0; line-height: 1.2; }
        .donation-subtitle { color: #64748b; font-size: 0.95rem; margin: 0; font-weight: 600; }
        
        .info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: #475569; font-size: 0.95rem; }
        
        .status-badge { display: inline-flex; align-items: center; background: #e0e7ff; color: #3b82f6; padding: 6px 12px; border-radius: 100px; font-weight: 700; font-size: 0.85rem; margin-bottom: 24px; width: max-content; }
        
        .btn-action { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: auto; }
        .btn-action:hover { background: #059669; box-shadow: 0 4px 12px rgba(16,185,129,0.2); }
        
        #loadingMsg { text-align: center; color: #64748b; font-weight: 600; padding: 80px; font-size: 1.2rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <!-- Top Web Navigation -->
    <nav class="top-nav-web">
        <a href="delivery_dashboard.html" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            FoodBridge Partner
        </a>
        <div class="nav-links">
            <a href="delivery_dashboard.html" class="nav-link">Available Orders</a>
            <a href="delivery_accepted.html" class="nav-link active">Available Donations</a>
            <a href="delivery_settings.html" class="nav-link">Settings</a>
        </div>
        <button class="user-profile-btn" onclick="window.location.href='delivery_settings.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span id="displayUserName">Partner</span>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="web-container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Available Donations</h1>
                <p class="page-subtitle">Help deliver surplus food to NGOs and orphanages.</p>
            </div>
            <button onclick="loadDonations()" style="background: white; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 8px; font-weight: 700; color: #0f172a; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                Refresh
            </button>
        </div>

        <div class="donations-grid" id="donationsList">
            <div id="loadingMsg">Loading charitable donations...</div>
        </div>
    </main>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const deliveryUser = SessionManager.getUser();
            if (!deliveryUser || deliveryUser.role !== 'delivery') {
                window.location.href = 'login_delivery.html';
                return;
            }

            document.getElementById('displayUserName').textContent = deliveryUser.name.split(' ')[0] || "Partner";
            window.loadDonations = loadDonations;
            loadDonations();
        });

        async function loadDonations() {
            const container = document.getElementById('donationsList');
            container.innerHTML = '<div id="loadingMsg">Loading charitable donations...</div>';
            
            try {
                const response = await apiCall('get_donations.php', { status: 'Pending' });
                
                if (response.status === 'success') {
                    container.innerHTML = '';
                    if (response.data.length === 0) {
                        container.innerHTML = '<div id="loadingMsg">No available donations right now. Check back later!</div>';
                        return;
                    }
                    
                    response.data.forEach(donation => {
                        const card = document.createElement('div');
                        card.className = 'donation-card';
                        
                        card.innerHTML = `
                            <div class="card-top">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                </div>
                                <div>
                                    <h2 class="donation-title">${donation.hotel_name || "Hotel"}</h2>
                                    <p class="donation-subtitle">Donation ID: #${donation.id}</p>
                                </div>
                            </div>
                            
                            <div class="info-row">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="width: 18px; height: 18px;"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                                <strong>Package:</strong> ${donation.package_description || "Food items"}
                            </div>
                            
                            <div class="info-row">
                                <svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="width: 18px; height: 18px;"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                                <strong>Quantity:</strong> ${donation.quantity} units
                            </div>
                            
                            <div class="status-badge">
                                Status: ${donation.status}
                            </div>
                            
                            <button onclick="acceptDonation(${donation.id})" class="btn-action">ACCEPT DONATION</button>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<div id="loadingMsg">Failed to load donations.</div>';
                }
            } catch(e) {
                container.innerHTML = '<div id="loadingMsg">Network error while fetching donations.</div>';
            }
        }

        async function acceptDonation(donationId) {
            const deliveryUser = SessionManager.getUser();
            try {
                const response = await apiCall('update_donation_status.php', { 
                    donation_id: donationId, 
                    status: 'Reserved',
                    delivery_partner_id: deliveryUser.id
                });
                if (response.status === 'success') {
                    alert('Donation Accepted successfully! Thank you for helping the community.');
                    loadDonations(); // Refresh grid
                } else {
                    alert(response.message || 'Failed to accept donation.');
                }
            } catch (e) {
                alert('Network error.');
            }
        }
    </script>
</body>
</html>
