<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Cheapest Deals</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .dash-header-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 24px; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 600px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 16px; }
        
        .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; color: #0f172a; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .back-btn:hover { background: #e2e8f0; }
        
        .page-title { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0; }
        
        .web-container { max-width: 600px; margin: 24px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; padding-bottom: 100px; }
        
        .deal-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; display: flex; gap: 16px; cursor: pointer; transition: 0.2s; }
        .deal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        
        .deal-img-wrapper { width: 100px; height: 100px; position: relative; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; }
        .deal-img { width: 100%; height: 100%; object-fit: cover; }
        
        .deal-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .deal-title { font-size: 1.1rem; font-weight: 800; color: #0f172a; margin: 0 0 4px 0; }
        .deal-hotel { font-size: 0.85rem; color: #64748b; margin: 0 0 8px 0; }
        
        .hygiene-badge { background: #dcfce7; color: #16a34a; font-size: 12px; font-weight: 800; padding: 4px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; width: max-content; margin-bottom: 8px; }
        
        .price-row { display: flex; align-items: baseline; gap: 8px; margin-top: auto; }
        .deal-price { font-size: 1.25rem; font-weight: 800; color: #16a34a; }
        .deal-original { font-size: 0.9rem; font-weight: 600; color: #94a3b8; text-decoration: line-through; }
        
        #loadingMsg { text-align: center; color: #64748b; font-weight: 600; padding: 40px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header class="dash-header-web">
        <div class="header-content">
            <a href="user_dashboard.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="page-title">Cheapest Best Deals</h1>
        </div>
    </header>

    <main class="web-container">
        <div id="loadingMsg">Finding the best deals...</div>
        <div id="dealsList"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user_dashboard.html" class="nav-item user-nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="user_orders.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span>Orders</span>
        </a>
        <a href="user_alerts.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span>Alerts</span>
        </a>
        <a href="user_settings.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!SessionManager.isLoggedIn()) {
                window.location.href = 'login_user.html';
                return;
            }
            loadDeals();
        });

        async function loadDeals() {
            const list = document.getElementById('dealsList');
            const loading = document.getElementById('loadingMsg');
            
            try {
                // search_food.php returns all foods sorted by discounted_price ASC
                const response = await apiCall('search_food.php', { query: '' });
                if (response.status === 'success') {
                    list.innerHTML = '';
                    if (!response.data || response.data.length === 0) {
                        loading.style.display = 'block';
                        loading.textContent = "No deals available right now.";
                        return;
                    }
                    loading.style.display = 'none';

                    response.data.forEach(item => {
                        const originalPrice = parseFloat(item.original_price);
                        const discountedPrice = parseFloat(item.discounted_price);
                        
                        const hygieneBadge = item.hygiene_percentage !== null && item.hygiene_percentage !== -1
                            ? `<span class="hygiene-badge">✨ ${Math.round(item.hygiene_percentage)}% Hygienic</span>` 
                            : '';
                            
                        const card = document.createElement('div');
                        card.className = 'deal-card';
                        
                        card.onclick = () => {
                            sessionStorage.setItem('currentFood', JSON.stringify({
                                food_id: item.id,
                                hotel_id: item.hotel_id,
                                item_name: item.item_name,
                                hotel_name: item.hotel_name || "Unknown Hotel",
                                price: discountedPrice < originalPrice ? discountedPrice : originalPrice
                            }));
                            window.location.href = 'food_detail.html';
                        };
                        
                        const imageHtml = item.image_url 
                            ? `<img src="http://localhost/foodbridgebackend/${item.image_url}" class="deal-img">`
                            : `<span style="color:#64748b; font-weight:bold; font-size: 0.8rem;">No Image</span>`;
                        
                        card.innerHTML = `
                            <div class="deal-img-wrapper">
                                ${imageHtml}
                            </div>
                            <div class="deal-info">
                                <h3 class="deal-title">${item.item_name}</h3>
                                <p class="deal-hotel">${item.hotel_name || "Hotel"}</p>
                                ${hygieneBadge}
                                <div class="price-row">
                                    <span class="deal-price">₹${discountedPrice}.0</span>
                                    ${originalPrice > discountedPrice ? `<span class="deal-original">₹${originalPrice}.0</span>` : ''}
                                </div>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                } else {
                    loading.textContent = 'Failed to load deals.';
                }
            } catch (e) {
                loading.textContent = 'Network Error.';
            }
        }
    </script>
</body>
</html>
