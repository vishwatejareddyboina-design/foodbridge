<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Saved Addresses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; }
        .header { padding: 24px; display: flex; align-items: center; gap: 16px; }
        .card { background: white; border-radius: 16px; padding: 24px; margin: 0 24px 24px 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .input-box { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; font-family: 'Inter', sans-serif; font-size: 1rem; box-sizing: border-box; margin-top: 8px; margin-bottom: 16px; height: 100px; resize: none;}
    </style>
</head>
<body>

    <header class="header">
        <a href="user_settings.html" style="color: #0f172a; display: flex;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h1 style="font-size: 1.25rem; font-weight: 800; color: #0f172a; margin: 0;">Saved Address</h1>
    </header>

    <div class="card">
        <h3 style="margin-top: 0; color: #0f172a;">Primary Delivery Address</h3>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 16px;">This address will be automatically loaded when you checkout.</p>
        
        <textarea id="etAddress" class="input-box" placeholder="Enter your full home or office address..."></textarea>
        
        <button id="btnSave" class="auth-btn" style="background: #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); margin: 0;">Save Address</button>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedAddress = localStorage.getItem('user_saved_address');
            if (savedAddress) {
                document.getElementById('etAddress').value = savedAddress;
            }

            document.getElementById('btnSave').addEventListener('click', () => {
                const address = document.getElementById('etAddress').value;
                if (address.trim()) {
                    localStorage.setItem('user_saved_address', address);
                    showToast("Address saved successfully!");
                } else {
                    showToast("Please enter an address", true);
                }
            });
        });
    </script>
</body>
</html>
