<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Your Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .web-container { max-width: 1200px; margin: 40px auto; min-height: calc(100vh - 140px); background: transparent; padding: 0 24px; }
        .orders-header { padding: 24px; display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 32px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
        
        .order-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .order-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); border-color: #cbd5e1; }
        
        .btn-delete { position: absolute; top: 20px; right: 20px; background: #fee2e2; color: #ef4444; border: none; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; z-index: 10; }
        .btn-delete:hover { background: #fca5a5; color: white; }

        @media (max-width: 768px) {
            .web-container { margin: 0; min-height: 100vh; padding: 16px; padding-bottom: 100px; }
            .orders-header { border-radius: 12px; }
            .orders-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="web-container">
        <!-- Header -->
        <header class="orders-header">
            <a href="user_dashboard.html" style="position: absolute; left: 24px; color: #0f172a; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 50%;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </a>
            <h1 style="font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0;">Your Orders</h1>
        </header>

        <div id="ordersContainer" class="orders-grid">
            <div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 40px; background: white; border-radius: 16px; font-weight: 600;">Loading orders...</div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user_dashboard.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="user_orders.html" class="nav-item user-nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span>Orders</span>
        </a>
        <a href="user_alerts.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span>Alerts</span>
        </a>
        <a href="user_settings.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = SessionManager.getUser();
            if (!user) {
                window.location.href = 'login_user.html';
                return;
            }

            const container = document.getElementById('ordersContainer');
            
            async function fetchOrders() {
                try {
                    const response = await apiCall('get_user_orders.php', { user_id: user.id });
                    
                    if (response.status === 'success') {
                        container.innerHTML = '';
                        if (response.data.length === 0) {
                            container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #64748b; padding: 60px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);"><svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" style="width: 48px; height: 48px; margin-bottom: 16px;"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg><div style="font-size: 1.1rem; font-weight: 700;">You have no orders yet.</div><div style="font-size: 0.95rem; margin-top: 4px;">Time to order some delicious food!</div></div>';
                            return;
                        }
                        
                        response.data.forEach(order => {
                            let statusColor = '#f59e0b';
                            if (order.status === 'Delivered') statusColor = '#10b981';
                            else if (order.status === 'Cancelled') statusColor = '#ef4444';

                            const card = document.createElement('div');
                            card.className = 'order-card';
                            
                            card.innerHTML = `
                                <button class="btn-delete" title="Delete Order">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                                <div style="margin-bottom: 24px; padding-right: 40px;">
                                    <div style="font-weight: 800; color: #0f172a; font-size: 1.25rem; margin-bottom: 4px;">Order #${order.order_id}</div>
                                    <div style="color: #64748b; font-weight: 600; font-size: 0.95rem;">${order.hotel_name || 'Hotel'}</div>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                                    <div>
                                        <div style="color: #475569; font-size: 0.95rem;">Amount: <span style="color: #00b468; font-weight: 900; font-size: 1.2rem;">₹${order.total_amount}.0</span></div>
                                        <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
                                            <span style="color: #64748b; font-size: 0.85rem;">Paid via: ${order.payment_method || 'N/A'}</span>
                                            <span style="background: #f1f5f9; color: #475569; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">${order.payment_status || 'Pending'}</span>
                                        </div>
                                    </div>
                                    <div style="color: ${statusColor}; font-weight: 800; font-size: 1rem; background: ${statusColor}15; padding: 6px 12px; border-radius: 8px;">${order.status}</div>
                                </div>
                            `;
                            
                            // Delete button click
                            card.querySelector('.btn-delete').onclick = async (e) => {
                                e.stopPropagation(); // Prevent card click
                                if(confirm('Are you sure you want to delete this order from history?')) {
                                    try {
                                        const delRes = await apiCall('delete_order.php', { order_id: order.order_id });
                                        if(delRes.status === 'success') {
                                            fetchOrders(); // Refresh list
                                        } else {
                                            showToast("Failed to delete order", true);
                                        }
                                    } catch(err) {
                                        showToast("Network error", true);
                                    }
                                }
                            };

                            // Card click
                            card.onclick = () => {
                                sessionStorage.setItem('trackingOrderId', order.order_id);
                                window.location.href = 'order_tracking.html';
                            };
                            
                            container.appendChild(card);
                        });
                    } else {
                        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #ef4444; padding: 20px;">Failed to load orders.</div>';
                    }
                } catch(e) {
                    container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #ef4444; padding: 20px;">Network error.</div>';
                }
            }

            fetchOrders();
        });
    </script>
</body>
</html>
