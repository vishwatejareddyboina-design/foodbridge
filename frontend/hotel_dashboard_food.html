<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Your Food Items</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .dash-header-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 30px 24px; display: flex; justify-content: center; }
        .header-content { max-width: 1000px; width: 100%; }
        
        .page-title { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; }
        
        .web-container { max-width: 1000px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .food-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
        
        .food-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 20px; transition: 0.2s; }
        .food-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        
        .food-card-top { display: flex; gap: 24px; }
        
        .food-img { width: 120px; height: 120px; border-radius: 12px; object-fit: cover; background: #f1f5f9; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 0.9rem; font-weight: 700; }
        
        .food-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .food-title { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin: 0 0 8px 0; }
        .food-price { font-size: 1.25rem; font-weight: 800; color: #16a34a; }
        .food-original { text-decoration: line-through; color: #94a3b8; font-size: 0.95rem; margin-left: 8px; font-weight: 600; }
        
        .action-bar { display: flex; gap: 12px; border-top: 1px solid #f1f5f9; padding-top: 20px; flex-wrap: wrap; }
        
        .btn-action { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: 0.2s; border: none; }
        .btn-discount { background: #eff6ff; color: #2563eb; }
        .btn-discount:hover { background: #dbeafe; }
        .btn-notify { background: #fef3c7; color: #d97706; }
        .btn-notify:hover { background: #fde68a; }
        .btn-delete { background: #fee2e2; color: #ef4444; margin-left: auto; }
        .btn-delete:hover { background: #fecaca; }
        
        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .modal-title { font-size: 1.4rem; font-weight: 800; color: #0f172a; margin: 0 0 8px 0; }
        .modal-sub { color: #64748b; margin: 0 0 24px 0; font-size: 0.95rem; }
        
        .modal-input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 24px; box-sizing: border-box; outline: none; font-family: 'Inter', sans-serif; }
        .modal-input:focus { border-color: #3b82f6; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-cancel { background: white; color: #64748b; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-save { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        
        #loadingMsg { text-align: center; color: #64748b; font-weight: 600; padding: 40px; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .food-card-top { flex-direction: column; align-items: flex-start; }
            .btn-delete { margin-left: 0; }
            .web-container { padding-bottom: 100px; }
        }
    </style>
</head>
<body class="dashboard-body">
    
    <header class="dash-header-web">
        <div class="header-content" style="display: flex; justify-content: space-between; align-items: center;">
            <h1 class="page-title">Your Food Items</h1>
            <button class="btn-save" onclick="openAddFoodModal()" style="display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Food Item
            </button>
        </div>
    </header>

    <main class="web-container pb-nav">
        <div id="loadingMsg">Loading your food items...</div>
        <div id="foodGrid" class="food-grid"></div>
    </main>

    <!-- Modal for Discount -->
    <div class="modal-overlay" id="discountModal">
        <div class="modal-card">
            <h2 class="modal-title">Apply Discount</h2>
            <p class="modal-sub" id="modalSub">Original Price: ₹0.0</p>
            <input type="number" id="discountInput" class="modal-input" placeholder="Enter discounted price (e.g. 150)">
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-save" onclick="saveDiscount()">SAVE</button>
            </div>
        </div>
    </div>

    <!-- Modal for Add Food -->
    <div class="modal-overlay" id="addFoodModal">
        <div class="modal-card">
            <h2 class="modal-title">Add Food Item</h2>
            <p class="modal-sub">List a new item for your hotel</p>
            
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 0.9rem; font-weight: 700; color: #475569; margin-bottom: 8px;">Food Photo (Optional)</label>
                <input type="file" id="addFoodImage" accept="image/*" class="modal-input" style="padding: 10px;">
            </div>
            
            <input type="text" id="addFoodName" class="modal-input" placeholder="Food Name (e.g. Chicken Biryani)">
            <input type="number" id="addFoodPrice" class="modal-input" placeholder="Original Price (₹) (e.g. 250)">
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeAddFoodModal()">CANCEL</button>
                <button class="btn-save" onclick="saveNewFood()" style="width: 100%;">Save Food Item</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="hotel_dashboard_home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="hotel_dashboard_food.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20.5L20.5 11a2.828 2.828 0 1 0-4-4L7 16.5M14 6l4 4M2 22l4-4M2 12l4-4M12 2l4 4"></path></svg>
            <span>Food</span>
        </a>
        <a href="hotel_dashboard_donations.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span>Donations</span>
        </a>
        <a href="hotel_dashboard_settings.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Settings</span>
        </a>
    </nav>
    <script src="api.js"></script>
    <script>
        let hotelUser = null;
        let currentEditingFood = null;

        document.addEventListener('DOMContentLoaded', async () => {
            hotelUser = SessionManager.getUser();
            if (!hotelUser || hotelUser.role !== 'hotel') {
                window.location.href = 'login_hotel.html';
                return;
            }
            loadFoodItems();
        });

        async function loadFoodItems() {
            const grid = document.getElementById('foodGrid');
            const loading = document.getElementById('loadingMsg');
            
            try {
                const response = await apiCall('get_food_items.php', { hotel_id: hotelUser.id });
                if (response.status === 'success') {
                    grid.innerHTML = '';
                    if (response.data.length === 0) {
                        loading.style.display = 'block';
                        loading.textContent = "You haven't listed any food items yet.";
                        return;
                    }
                    loading.style.display = 'none';

                    response.data.forEach(item => {
                        const originalPrice = parseFloat(item.original_price);
                        const discountedPrice = parseFloat(item.discounted_price);
                        
                        const card = document.createElement('div');
                        card.className = 'food-card';
                        
                        const imageHtml = item.image_url 
                            ? `<img src="http://localhost/foodbridgebackend/${item.image_url}" class="food-img">`
                            : `<div class="food-img">No Image</div>`;

                        card.innerHTML = `
                            <div class="food-card-top">
                                ${imageHtml}
                                <div class="food-info">
                                    <h3 class="food-title">${item.item_name}</h3>
                                    <div>
                                        <span class="food-price">₹${discountedPrice}.0</span>
                                        ${originalPrice > discountedPrice ? `<span class="food-original">₹${originalPrice}.0</span>` : ''}
                                    </div>
                                </div>
                            </div>
                            <div class="action-bar">
                                <button class="btn-action btn-discount" onclick='openModal(${JSON.stringify(item)})'>
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                                    Apply Discount
                                </button>
                                <button class="btn-action btn-notify" onclick='notifyRush()'>
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                                    Notify Rush
                                </button>
                                <button class="btn-action btn-delete" onclick='deleteFood(${item.id})'>
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    Delete
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    loading.textContent = 'Failed to load food items.';
                }
            } catch (e) {
                loading.textContent = 'Network Error.';
            }
        }

        // Modal Logic
        function openModal(item) {
            currentEditingFood = item;
            document.getElementById('modalSub').textContent = `Original Price: ₹${parseFloat(item.original_price).toFixed(1)}`;
            document.getElementById('discountInput').value = '';
            document.getElementById('discountModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('discountModal').style.display = 'none';
            currentEditingFood = null;
        }

        async function saveDiscount() {
            if (!currentEditingFood) return;
            const newPrice = document.getElementById('discountInput').value;
            
            if (!newPrice || isNaN(newPrice)) {
                alert("Please enter a valid price.");
                return;
            }

            try {
                const response = await apiCall('update_discount.php', {
                    food_id: currentEditingFood.id,
                    discounted_price: newPrice,
                    hotel_id: hotelUser.id,
                    item_name: currentEditingFood.item_name
                });
                
                if (response.status === 'success') {
                    closeModal();
                    loadFoodItems(); // refresh
                } else {
                    alert(response.message || "Failed to update discount.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }

        // Delete Logic
        async function deleteFood(food_id) {
            if (!confirm("Are you sure you want to delete this food item?")) return;
            
            try {
                const response = await apiCall('delete_food.php', {
                    food_id: food_id,
                    hotel_id: hotelUser.id
                });
                
                if (response.status === 'success') {
                    loadFoodItems(); // refresh
                } else {
                    alert(response.message || "Failed to delete.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }

        // Notify Rush Logic
        async function notifyRush() {
            try {
                const response = await apiCall('notify_rush.php', {
                    hotel_id: hotelUser.id,
                    hotel_name: hotelUser.name
                });
                
                if (response.status === 'success') {
                    alert("Rush notification sent to users successfully!");
                } else {
                    alert(response.message || "Failed to send notification.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }

        // Add Food Logic
        function openAddFoodModal() {
            document.getElementById('addFoodName').value = '';
            document.getElementById('addFoodPrice').value = '';
            document.getElementById('addFoodImage').value = '';
            document.getElementById('addFoodModal').style.display = 'flex';
        }

        function closeAddFoodModal() {
            document.getElementById('addFoodModal').style.display = 'none';
        }

        async function saveNewFood() {
            const name = document.getElementById('addFoodName').value.trim();
            const price = document.getElementById('addFoodPrice').value.trim();
            const imageInput = document.getElementById('addFoodImage');
            
            if (!name || !price) {
                alert("Please enter a name and price.");
                return;
            }

            let base64Image = '';
            if (imageInput.files && imageInput.files[0]) {
                base64Image = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                    reader.readAsDataURL(imageInput.files[0]);
                });
            }

            try {
                const response = await apiCall('add_food.php', {
                    hotel_id: hotelUser.id,
                    item_name: name,
                    price: price,
                    image_base64: base64Image
                });
                
                if (response.status === 'success') {
                    closeAddFoodModal();
                    loadFoodItems(); // refresh
                } else {
                    alert(response.message || "Failed to add food.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }
    </script>
</body>
</html>
