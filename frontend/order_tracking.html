<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Order Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .web-container { max-width: 600px; margin: 0 auto; background: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .tracking-header { padding: 24px; display: flex; align-items: center; gap: 16px; background: transparent; }
        .content-scroll { padding-bottom: 120px; padding-left: 24px; padding-right: 24px; }
        
        .timeline { margin-top: 24px; padding-left: 12px; }
        .timeline-item { position: relative; padding-left: 32px; padding-bottom: 32px; }
        .timeline-item:last-child { padding-bottom: 0; }
        
        /* The connecting line */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 11px; /* center of the circle */
            top: 24px;
            bottom: -8px;
            width: 2px;
            background: #cbd5e1;
        }
        .timeline-item:last-child::before { display: none; }
        
        /* The active line */
        .timeline-item.completed::before { background: #00b468; }
        
        /* The circle icon */
        .timeline-icon {
            position: absolute;
            left: 0;
            top: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .timeline-item.completed .timeline-icon, .timeline-item.active .timeline-icon {
            background: #00b468;
        }
        .timeline-icon svg { width: 14px; height: 14px; stroke: white; stroke-width: 3; }

        .timeline-title { font-size: 1.1rem; font-weight: 700; color: #64748b; padding-top: 2px; }
        .timeline-item.completed .timeline-title, .timeline-item.active .timeline-title { color: #0f172a; }

        .bottom-bar { background: transparent; padding: 24px; position: sticky; bottom: 0; left: 0; width: 100%; box-sizing: border-box; }
        .btn-refresh {
            background: #3b82f6; /* Blue as per screenshot */
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-weight: 700;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="web-container">
    <header class="tracking-header">
        <a href="user_orders.html" style="color: #0f172a; display: flex;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <h1 style="font-size: 1.25rem; font-weight: 800; color: #0f172a; margin: 0; margin-left: 12px;">Order Tracking</h1>
    </header>

    <div class="content-scroll">
        <div style="font-size: 1rem; color: #64748b; font-weight: 600; margin-bottom: 16px;">Order ID: <span id="orderIdText" style="color: #0f172a;">#---</span></div>
        
        <div class="timeline" id="timelineContainer">
            <!-- Timeline Item 1 -->
            <div class="timeline-item" id="stepPlaced">
                <div class="timeline-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <div class="timeline-title">Order Placed</div>
            </div>
            
            <!-- Timeline Item 2 -->
            <div class="timeline-item" id="stepAccepted">
                <div class="timeline-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <div class="timeline-title">Hotel Accepted</div>
            </div>
            
            <!-- Timeline Item 3 -->
            <div class="timeline-item" id="stepOut">
                <div class="timeline-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <div class="timeline-title">Out for Delivery</div>
            </div>
            
            <!-- Timeline Item 4 -->
            <div class="timeline-item" id="stepDelivered">
                <div class="timeline-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <div class="timeline-title">Delivered</div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button id="btnRefresh" class="btn-refresh">REFRESH STATUS</button>
    </div>
</div>

<script src="api.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const orderId = sessionStorage.getItem('trackingOrderId');
        if (!orderId) {
            window.location.href = 'user_orders.html';
            return;
        }

        document.getElementById('orderIdText').textContent = `#${orderId}`;

        const steps = ['stepPlaced', 'stepAccepted', 'stepOut', 'stepDelivered'];

        function setProgress(status) {
            // Reset all
            steps.forEach(id => {
                document.getElementById(id).classList.remove('completed');
                document.getElementById(id).classList.remove('active');
            });

            // "Pending", "Accepted", "Out for Delivery", "Delivered"
            let progressIndex = 0;
            if (status === 'Accepted') progressIndex = 1;
            else if (status === 'Out for Delivery') progressIndex = 2;
            else if (status === 'Delivered') progressIndex = 3;

            // Mark up to progressIndex as completed/active
            for (let i = 0; i <= progressIndex; i++) {
                if (i === progressIndex) {
                    document.getElementById(steps[i]).classList.add('active');
                } else {
                    document.getElementById(steps[i]).classList.add('completed');
                }
            }
        }

        async function fetchStatus() {
            const btn = document.getElementById('btnRefresh');
            btn.textContent = 'Refreshing...';
            btn.disabled = true;

            try {
                const response = await apiCall('get_order_status.php', { order_id: orderId });
                if (response.status === 'success') {
                    setProgress(response.data.status);
                } else {
                    showToast("Failed to fetch status", true);
                }
            } catch(e) {
                showToast("Network error", true);
            }

            setTimeout(() => {
                btn.textContent = 'REFRESH STATUS';
                btn.disabled = false;
            }, 500);
        }

        // Initial fetch
        fetchStatus();

        // Button click
        document.getElementById('btnRefresh').addEventListener('click', fetchStatus);
    });
</script>
</body>
</html>
