<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Active Donations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .dash-header-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 30px 24px; display: flex; justify-content: center; }
        .header-content { max-width: 1000px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        
        .page-title { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; }
        
        .btn-primary { background: #ea580c; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; box-shadow: 0 4px 10px rgba(234, 88, 12, 0.2); }
        .btn-primary:hover { background: #c2410c; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(234, 88, 12, 0.3); }
        
        .web-container { max-width: 1000px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .donation-list { display: flex; flex-direction: column; gap: 16px; }
        
        .donation-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .donation-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.04); border-color: #cbd5e1; transform: translateY(-2px); }
        
        .donation-left { display: flex; align-items: center; gap: 20px; }
        .donation-icon { width: 64px; height: 64px; background: #ffedd5; border-radius: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .donation-icon svg { width: 32px; height: 32px; stroke: #ea580c; }
        
        .donation-title { font-size: 1.25rem; font-weight: 800; color: #0f172a; margin: 0 0 4px 0; }
        .donation-qty { color: #64748b; font-size: 1rem; margin: 0 0 8px 0; }
        
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 700; }
        .badge-pending { background: #dbeafe; color: #2563eb; }
        .badge-picked { background: #dcfce7; color: #16a34a; }
        .badge-expired { background: #fee2e2; color: #ef4444; }
        
        .btn-delete { background: transparent; border: none; cursor: pointer; padding: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-delete:hover { background: #fee2e2; }
        .btn-delete svg { width: 24px; height: 24px; stroke: #ef4444; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal-card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .modal-title { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0 0 8px 0; }
        .modal-desc { color: #64748b; margin: 0 0 24px 0; font-size: 0.95rem; line-height: 1.5; }
        
        .form-group { margin-bottom: 20px; }
        .modal-input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; font-family: 'Inter', sans-serif; transition: 0.2s; }
        .modal-input:focus { border-color: #10b981; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 32px; }
        .btn-cancel { background: white; color: #64748b; border: 1px solid #cbd5e1; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-cancel:hover { background: #f1f5f9; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: #059669; }
        
        #loadingMsg { text-align: center; color: #64748b; font-weight: 600; padding: 40px; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; align-items: flex-start; gap: 16px; }
            .web-container { padding-bottom: 100px; }
        }
    </style>
</head>
<body class="dashboard-body">

    <header class="dash-header-web">
        <div class="header-content">
            <h1 class="page-title">Active Donations</h1>
            <button class="btn-primary" onclick="openModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Donation
            </button>
        </div>
    </header>

    <main class="web-container pb-nav">
        <div id="loadingMsg">Loading your donations...</div>
        <div id="donationsList" class="donation-list"></div>
    </main>

    <!-- Modal for New Donation -->
    <div class="modal-overlay" id="donationModal">
        <div class="modal-card">
            <h2 class="modal-title">Donate Surplus Food</h2>
            <p class="modal-desc">If you have leftover food from parties or events, list it here for our delivery partners to distribute to NGOs.</p>
            
            <div class="form-group">
                <input type="text" id="donationDesc" class="modal-input" placeholder="Description (e.g. 50 plates of Rice and Curry)">
            </div>
            <div class="form-group">
                <input type="number" id="donationQty" class="modal-input" placeholder="Approx. Servings Quantity (e.g. 50)">
            </div>
            <div class="form-group">
                <input type="number" id="donationHours" class="modal-input" placeholder="Hours until food expires (e.g. 4)">
            </div>
            
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">CANCEL</button>
                <button class="btn-submit" onclick="submitDonation()">SUBMIT FOR PICKUP</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="hotel_dashboard_home.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="hotel_dashboard_food.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 20.5L20.5 11a2.828 2.828 0 1 0-4-4L7 16.5M14 6l4 4M2 22l4-4M2 12l4-4M12 2l4 4"></path></svg>
            <span>Food</span>
        </a>
        <a href="hotel_dashboard_donations.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span>Donations</span>
        </a>
        <a href="hotel_dashboard_settings.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Settings</span>
        </a>
    </nav>
    <script src="api.js"></script>
    <script>
        let hotelUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            hotelUser = SessionManager.getUser();
            if (!hotelUser || hotelUser.role !== 'hotel') {
                window.location.href = 'login_hotel.html';
                return;
            }
            loadDonations();
        });

        async function loadDonations() {
            const list = document.getElementById('donationsList');
            const loading = document.getElementById('loadingMsg');
            
            try {
                const response = await apiCall('get_hotel_donations.php', { hotel_id: hotelUser.id });
                if (response.status === 'success') {
                    list.innerHTML = '';
                    if (response.data.length === 0) {
                        loading.style.display = 'block';
                        loading.textContent = "You don't have any active donations right now.";
                        return;
                    }
                    loading.style.display = 'none';

                    response.data.forEach(item => {
                        const statusClass = item.status === 'Pending' ? 'badge-pending' : (item.status === 'Picked Up' ? 'badge-picked' : 'badge-expired');
                        
                        const card = document.createElement('div');
                        card.className = 'donation-card';
                        
                        card.innerHTML = `
                            <div class="donation-left">
                                <div class="donation-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                </div>
                                <div>
                                    <h3 class="donation-title">${item.package_description}</h3>
                                    <p class="donation-qty">Qty: ${item.quantity}</p>
                                    <span class="badge ${statusClass}">${item.status}</span>
                                </div>
                            </div>
                            <button class="btn-delete" onclick="deleteDonation(${item.id})" title="Delete Donation">
                                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        `;
                        list.appendChild(card);
                    });
                } else {
                    loading.textContent = 'Failed to load donations.';
                }
            } catch (e) {
                loading.textContent = 'Network Error.';
            }
        }

        // Modal Logic
        function openModal() {
            document.getElementById('donationDesc').value = '';
            document.getElementById('donationQty').value = '';
            document.getElementById('donationHours').value = '';
            document.getElementById('donationModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('donationModal').style.display = 'none';
        }

        async function submitDonation() {
            const desc = document.getElementById('donationDesc').value.trim();
            const qty = document.getElementById('donationQty').value.trim();
            const hours = document.getElementById('donationHours').value.trim();
            
            if (!desc || !qty || !hours) {
                alert("Please fill in all fields.");
                return;
            }

            // Calculate expiration time
            const now = new Date();
            now.setHours(now.getHours() + parseInt(hours));
            
            // Format YYYY-MM-DD HH:MM:SS
            const expTimeStr = now.toISOString().slice(0, 19).replace('T', ' ');

            try {
                const response = await apiCall('add_donation.php', {
                    hotel_id: hotelUser.id,
                    package_description: desc,
                    quantity: parseInt(qty),
                    expiration_time: expTimeStr
                });
                
                if (response.status === 'success') {
                    closeModal();
                    loadDonations(); // refresh
                } else {
                    alert(response.message || "Failed to add donation.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }

        async function deleteDonation(id) {
            if (!confirm("Are you sure you want to cancel this donation?")) return;
            
            try {
                const response = await apiCall('delete_donation.php', { donation_id: id });
                if (response.status === 'success') {
                    loadDonations(); // refresh
                } else {
                    alert(response.message || "Failed to delete.");
                }
            } catch (e) {
                alert("Network error.");
            }
        }
    </script>
</body>
</html>
