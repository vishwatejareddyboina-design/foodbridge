<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Hotel Partner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <!-- Top Image Area -->
        <div class="auth-top-image" style="background-image: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&q=80&w=1000');">
            <div class="auth-top-gradient"></div>
            <div class="auth-icon-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00b468" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </div>
        </div>

        <!-- Content Area -->
        <div class="auth-content">
            <h1 class="auth-title">Hotel Partner</h1>
            <p class="auth-subtitle">Login to manage your surplus food</p>

            <form class="auth-form" id="loginForm">
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="auth-options">
                    <a href="forgot_password.html" class="forgot-link" onclick="localStorage.setItem('resetRole', 'hotel');">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn" id="btnSubmit">Login</button>
            </form>

            <p class="auth-footer" style="margin-top: 30px;">
                Don't have an account? <a href="register_hotel.html">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            const data = {
                role: 'hotel',
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const response = await apiCall('login.php', data);
            
            if (response.status === 'success') {
                SessionManager.login(response.data);
                window.location.href = 'hotel_dashboard_home.html';
            } else {
                showToast(response.message, true);
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
