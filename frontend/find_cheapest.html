<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Find Cheapest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .cheapest-header { background: #16a34a; color: white; padding: 40px 24px 60px 24px; position: relative; display: flex; justify-content: center; }
        .header-content { max-width: 1000px; width: 100%; position: relative; }
        
        .btn-back { position: absolute; left: 0; top: 0; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: 0.2s; text-decoration: none; }
        .btn-back:hover { background: rgba(255,255,255,0.2); }
        
        .header-title { font-size: 2.2rem; font-weight: 800; margin: 0 0 8px 0; padding-left: 60px; }
        .header-sub { font-size: 1.1rem; opacity: 0.9; margin: 0; padding-left: 60px; }
        
        .search-container { max-width: 1000px; margin: -30px auto 0 auto; width: 100%; padding: 0 24px; box-sizing: border-box; position: relative; z-index: 10; }
        .search-box { background: white; border-radius: 16px; padding: 16px 24px; display: flex; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e2e8f0; }
        .search-box svg { width: 24px; height: 24px; stroke: #94a3b8; margin-right: 16px; }
        .search-box input { border: none; outline: none; width: 100%; font-size: 1.1rem; font-family: 'Inter', sans-serif; color: #0f172a; }
        .search-box input::placeholder { color: #94a3b8; }
        
        .results-container { max-width: 1000px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        
        .food-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; display: flex; gap: 16px; }
        .food-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); border-color: #cbd5e1; }
        
        .food-img { width: 100px; height: 100px; border-radius: 12px; object-fit: cover; background: #f1f5f9; flex-shrink: 0; }
        .food-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        @media (max-width: 768px) {
            .header-title { font-size: 1.8rem; }
            .header-sub { font-size: 1rem; }
            .food-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="cheapest-header">
        <div class="header-content">
            <a href="user_dashboard.html" class="btn-back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="header-title">Find Cheapest</h1>
            <p class="header-sub">Get the best deals on your cravings</p>
        </div>
    </header>
    
    <div class="search-container">
        <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" placeholder="Search for biryani, pizza...">
        </div>
    </div>
    
    <div class="results-container">
        <div id="loadingText" style="text-align: center; color: #64748b; font-weight: 600; font-size: 1.1rem; padding: 40px;">Finding the best deals...</div>
        <div id="foodGrid" class="food-grid"></div>
    </div>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('foodGrid');
            const loadingText = document.getElementById('loadingText');
            const searchInput = document.getElementById('searchInput');
            let allFoodItems = [];

            function renderItems(items) {
                grid.innerHTML = '';
                if (items.length === 0) {
                    loadingText.style.display = 'block';
                    loadingText.textContent = "No deals found for your search.";
                    return;
                }
                
                loadingText.style.display = 'none';
                
                items.forEach(item => {
                    const originalPrice = parseFloat(item.original_price);
                    const discountedPrice = parseFloat(item.discounted_price);
                    
                    const card = document.createElement('div');
                    card.className = 'food-card';
                    card.onclick = () => {
                        sessionStorage.setItem('currentFood', JSON.stringify({
                            food_id: item.id,
                            hotel_id: item.hotel_id,
                            item_name: item.item_name,
                            hotel_name: item.hotel_name || "Unknown Hotel",
                            price: discountedPrice < originalPrice ? discountedPrice : originalPrice
                        }));
                        window.location.href = 'food_detail.html';
                    };
                    
                    const imageHtml = item.image_url 
                        ? `<img src="http://localhost/foodbridgebackend/${item.image_url}" class="food-img">`
                        : `<div class="food-img" style="display:flex; align-items:center; justify-content:center;"><span style="color:#94a3b8; font-weight:bold; font-size:0.8rem;">No Image</span></div>`;
                        
                    card.innerHTML = `
                        ${imageHtml}
                        <div class="food-info">
                            <div>
                                <div style="font-size: 1.15rem; font-weight: 800; color: #0f172a; margin-bottom: 4px;">${item.item_name}</div>
                                <div style="font-size: 0.9rem; color: #64748b;">${item.hotel_name || "Hotel"}</div>
                            </div>
                            <div style="display: flex; align-items: flex-end; justify-content: space-between;">
                                <div style="font-weight: 900; color: #16a34a; font-size: 1.25rem;">₹${discountedPrice}.0</div>
                                ${originalPrice > discountedPrice ? `<div style="text-decoration: line-through; color: #94a3b8; font-size: 0.9rem;">₹${originalPrice}.0</div>` : ''}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            try {
                const response = await apiCall('search_food.php', { query: "" });
                if (response.status === 'success') {
                    // Sort by cheapest immediately
                    allFoodItems = response.data.sort((a, b) => parseFloat(a.discounted_price) - parseFloat(b.discounted_price));
                    renderItems(allFoodItems);
                } else {
                    loadingText.textContent = 'Failed to load deals.';
                }
            } catch(e) {
                loadingText.textContent = 'Network error.';
            }
            
            searchInput.addEventListener('input', (e) => {
                const q = e.target.value.toLowerCase();
                const filtered = allFoodItems.filter(item => 
                    item.item_name.toLowerCase().includes(q) || 
                    (item.hotel_name && item.hotel_name.toLowerCase().includes(q))
                );
                renderItems(filtered);
            });
        });
    </script>
</body>
</html>
