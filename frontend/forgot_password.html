<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body scrollable">
    <div class="register-header">
        <button class="back-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
    </div>

    <div class="auth-content" style="margin-top: 20px;">
        <h1 class="auth-title">Forgot Password</h1>
        <p class="auth-subtitle">Enter your email address to reset your password.</p>

        <form class="auth-form" action="#" onsubmit="event.preventDefault(); window.location.href='change_password.html';" style="margin-top: 40px;">
            <div class="input-group">
                <div class="input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </div>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <button type="submit" class="auth-btn">Send Link</button>
        </form>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            localStorage.setItem('resetEmail', email);
            window.location.href = 'change_password.html';
        });
    </script>
</body>
</html>
