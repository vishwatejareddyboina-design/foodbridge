<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Delivery Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Top Web Navigation */
        .top-nav-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 40px; height: 80px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; color: #ea580c; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-link { color: #64748b; font-weight: 600; text-decoration: none; font-size: 1rem; transition: 0.2s; padding: 8px 12px; border-radius: 8px; }
        .nav-link:hover { color: #ea580c; background: #fff7ed; }
        .nav-link.active { color: #ea580c; background: #ffedd5; font-weight: 700; }
        
        .user-profile-btn { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 8px 16px; border-radius: 100px; text-decoration: none; color: #0f172a; font-weight: 700; transition: 0.2s; cursor: pointer; border: none; }
        .user-profile-btn:hover { background: #e2e8f0; }
        
        /* Main Container */
        .web-container { max-width: 800px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .page-header { margin-bottom: 32px; text-align: center; }
        .page-title { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; }
        
        /* Settings List */
        .settings-list { display: flex; flex-direction: column; gap: 16px; }
        
        .setting-card { background: white; border-radius: 16px; padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; text-decoration: none; color: inherit; }
        .setting-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-color: #cbd5e1; }
        
        .setting-info { display: flex; align-items: center; gap: 20px; }
        .setting-icon-box { width: 48px; height: 48px; border-radius: 12px; background: #f8fafc; display: flex; align-items: center; justify-content: center; color: #64748b; }
        
        .setting-title { font-size: 1.2rem; font-weight: 700; color: #0f172a; margin: 0; }
        .setting-subtitle { font-size: 0.95rem; color: #64748b; margin: 4px 0 0 0; }
        
        .arrow-icon { color: #94a3b8; width: 24px; height: 24px; }
        
        .logout-card { border-color: #fee2e2; }
        .logout-card .setting-icon-box { background: #fee2e2; color: #ef4444; }
        .logout-card .setting-title { color: #ef4444; }
        .logout-card .arrow-icon { display: none; }
        
        .profile-card { background: #ffedd5; border-color: #fdba74; cursor: default; }
        .profile-card:hover { transform: none; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border-color: #fdba74; }
        .profile-card .setting-icon-box { background: #ea580c; color: white; }
    </style>
</head>
<body>

    <!-- Top Web Navigation -->
    <nav class="top-nav-web">
        <a href="delivery_dashboard.html" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            FoodBridge Partner
        </a>
        <div class="nav-links">
            <a href="delivery_dashboard.html" class="nav-link">Available Orders</a>
            <a href="delivery_accepted.html" class="nav-link">Available Donations</a>
            <a href="delivery_settings.html" class="nav-link active">Settings</a>
        </div>
        <button class="user-profile-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span id="displayUserName">Partner</span>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="web-container">
        
        <div class="page-header">
            <h1 class="page-title">Partner Settings</h1>
        </div>
        
        <div class="settings-list">
            
            <div class="setting-card profile-card">
                <div class="setting-info">
                    <div class="setting-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div>
                        <h3 class="setting-title" id="profileName">Loading...</h3>
                        <p class="setting-subtitle" id="profileEmail">Loading...</p>
                    </div>
                </div>
            </div>
            
            <a href="change_password.html" class="setting-card">
                <div class="setting-info">
                    <div class="setting-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <div>
                        <h3 class="setting-title">Change Password</h3>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            
            <a href="help_support.html" class="setting-card">
                <div class="setting-info">
                    <div class="setting-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    </div>
                    <div>
                        <h3 class="setting-title">Help and Support</h3>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            
            <a href="privacy_policy.html" class="setting-card">
                <div class="setting-info">
                    <div class="setting-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    </div>
                    <div>
                        <h3 class="setting-title">Privacy Policy</h3>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            
            <div class="setting-card">
                <div class="setting-info">
                    <div class="setting-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                    </div>
                    <div>
                        <h3 class="setting-title">Review and Rating</h3>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </a>
            
            <div class="setting-card logout-card" onclick="SessionManager.logout()">
                <div class="setting-info">
                    <div class="setting-icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </div>
                    <div>
                        <h3 class="setting-title">Logout</h3>
                    </div>
                </div>
            </div>
            
        </div>

    </main>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const deliveryUser = SessionManager.getUser();
            if (!deliveryUser || deliveryUser.role !== 'delivery') {
                window.location.href = 'login_delivery.html';
                return;
            }

            const nameStr = deliveryUser.name || "Delivery Partner";
            document.getElementById('displayUserName').textContent = nameStr.split(' ')[0];
            document.getElementById('profileName').textContent = nameStr;
            document.getElementById('profileEmail').textContent = deliveryUser.email || "partner@foodbridge.com";
        });
    </script>
</body>
</html>
