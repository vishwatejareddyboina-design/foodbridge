<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Delivery Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Top Web Navigation */
        .top-nav-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 0 40px; height: 80px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-size: 1.5rem; font-weight: 800; color: #ea580c; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-link { color: #64748b; font-weight: 600; text-decoration: none; font-size: 1rem; transition: 0.2s; padding: 8px 12px; border-radius: 8px; }
        .nav-link:hover { color: #ea580c; background: #fff7ed; }
        .nav-link.active { color: #ea580c; background: #ffedd5; font-weight: 700; }
        
        .user-profile-btn { display: flex; align-items: center; gap: 12px; background: #f1f5f9; padding: 8px 16px; border-radius: 100px; text-decoration: none; color: #0f172a; font-weight: 700; transition: 0.2s; cursor: pointer; border: none; }
        .user-profile-btn:hover { background: #e2e8f0; }
        
        /* Main Container */
        .web-container { max-width: 1200px; margin: 40px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; }
        
        .page-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 2rem; font-weight: 800; color: #0f172a; margin: 0; }
        .page-subtitle { color: #64748b; font-size: 1.1rem; margin-top: 8px; }
        
        /* Grid Layout */
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 24px; }
        
        .delivery-card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; display: flex; flex-direction: column; transition: 0.2s; }
        .delivery-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); border-color: #cbd5e1; }
        
        .delivery-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; border-bottom: 1px solid #f1f5f9; padding-bottom: 16px; }
        .delivery-info { display: flex; gap: 16px; }
        .delivery-icon-bg { width: 48px; height: 48px; border-radius: 12px; background: #ffedd5; display: flex; align-items: center; justify-content: center; color: #ea580c; flex-shrink: 0; }
        
        .delivery-title { font-weight: 800; color: #0f172a; font-size: 1.25rem; line-height: 1.2; }
        .delivery-subtitle { color: #64748b; font-size: 0.95rem; margin-top: 6px; display: flex; align-items: center; gap: 6px; }
        
        .payout-box { text-align: right; }
        .payout-amount { font-size: 1.5rem; font-weight: 800; color: #10b981; }
        .payout-meta { font-size: 0.8rem; color: #64748b; font-weight: 700; text-transform: uppercase; margin-top: 4px; background: #f1f5f9; padding: 4px 8px; border-radius: 6px; display: inline-block; }
        
        .btn-action { width: 100%; padding: 14px; background: #ea580c; color: white; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: auto; }
        .btn-action:hover { background: #c2410c; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2); }
        
        #loadingMsg { text-align: center; color: #64748b; font-weight: 600; padding: 80px; font-size: 1.2rem; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <!-- Top Web Navigation -->
    <nav class="top-nav-web">
        <a href="delivery_dashboard.html" class="nav-brand">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            FoodBridge Partner
        </a>
        <div class="nav-links">
            <a href="delivery_dashboard.html" class="nav-link active">Available Orders</a>
            <a href="delivery_accepted.html" class="nav-link">Available Donations</a>
            <a href="delivery_settings.html" class="nav-link">Settings</a>
        </div>
        <button class="user-profile-btn" onclick="window.location.href='delivery_settings.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span id="displayUserName">Partner</span>
        </button>
    </nav>

    <!-- Main Content -->
    <main class="web-container">
        <div class="page-header">
            <div>
                <h1 class="page-title">Available Food Orders</h1>
                <p class="page-subtitle">Pick up and deliver standard hotel orders near you.</p>
            </div>
            <button onclick="loadOrders()" style="background: white; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 8px; font-weight: 700; color: #0f172a; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 16px; height: 16px;"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                Refresh List
            </button>
        </div>

        <div class="orders-grid" id="ordersList">
            <div id="loadingMsg">Searching for nearby orders...</div>
        </div>
    </main>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const deliveryUser = SessionManager.getUser();
            if (!deliveryUser || deliveryUser.role !== 'delivery') {
                window.location.href = 'login_delivery.html';
                return;
            }

            document.getElementById('displayUserName').textContent = deliveryUser.name.split(' ')[0] || "Partner";
            window.loadOrders = loadOrders; // Expose to global for the refresh button
            loadOrders();
        });

        async function loadOrders() {
            const container = document.getElementById('ordersList');
            container.innerHTML = '<div id="loadingMsg">Searching for nearby orders...</div>';
            
            try {
                const response = await apiCall('delivery_orders.php', { status: 'Ready' });
                
                if (response.status === 'success') {
                    container.innerHTML = '';
                    if (response.data.length === 0) {
                        container.innerHTML = '<div id="loadingMsg">No pending deliveries near you at the moment. Take a break!</div>';
                        return;
                    }
                    
                    response.data.forEach(order => {
                        const card = document.createElement('div');
                        card.className = 'delivery-card';
                        
                        card.innerHTML = `
                            <div class="delivery-header">
                                <div class="delivery-info">
                                    <div class="delivery-icon-bg">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><circle cx="12" cy="12" r="10"></circle><path d="M12 8v4l3 3"></path></svg>
                                    </div>
                                    <div>
                                        <div class="delivery-title">Order #${order.id}</div>
                                        <div class="delivery-subtitle">
                                            <span style="color:#ea580c; font-weight:700;">From:</span> ${order.hotel_name || 'Hotel'}
                                        </div>
                                    </div>
                                </div>
                                <div class="payout-box">
                                    <div class="payout-amount">₹${order.total_amount}</div>
                                    <div class="payout-meta">${order.status}</div>
                                </div>
                            </div>
                            
                            <div style="margin-bottom: 24px;">
                                <div class="delivery-subtitle" style="color: #0f172a; font-weight: 600;">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="width: 16px; height: 16px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                    Drop-off:
                                </div>
                                <p style="margin: 4px 0 0 22px; color: #475569; line-height: 1.4;">${order.delivery_address || 'Customer address not specified'}</p>
                            </div>

                            <button onclick="acceptOrder(${order.id})" class="btn-action">Accept Delivery Assignment</button>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = '<div id="loadingMsg">Failed to load deliveries.</div>';
                }
            } catch(e) {
                container.innerHTML = '<div id="loadingMsg">Network error while fetching orders.</div>';
            }
        }

        async function acceptOrder(orderId) {
            const deliveryUser = SessionManager.getUser();
            try {
                const response = await apiCall('update_order_status.php', { order_id: orderId, status: 'Assigned to Delivery', delivery_partner_id: deliveryUser.id });
                if (response.status === 'success') {
                    alert('Order accepted! Please head to the hotel to pick it up.');
                    loadOrders(); // Refresh the grid
                } else {
                    alert(response.message || 'Failed to accept order.');
                }
            } catch (e) {
                alert('Network error.');
            }
        }
    </script>
</body>
</html>
