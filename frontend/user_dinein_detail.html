<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Dine-In Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        .dash-header-web { background: white; border-bottom: 1px solid #e2e8f0; padding: 24px; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 600px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 16px; }
        
        .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: #f1f5f9; color: #0f172a; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .back-btn:hover { background: #e2e8f0; }
        
        .page-title { font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .web-container { max-width: 600px; margin: 24px auto; width: 100%; padding: 0 24px; box-sizing: border-box; flex: 1; padding-bottom: 100px; }
        
        .status-card { background: white; border-radius: 20px; padding: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; margin-bottom: 24px; }
        
        .hotel-name { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin: 0 0 8px 0; text-align: center; }
        .hotel-address { color: #64748b; font-size: 1rem; margin: 0 0 32px 0; display: flex; justify-content: center; align-items: center; gap: 4px; text-align: center; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
        
        .stat-box { background: #f8fafc; border-radius: 16px; padding: 24px; text-align: center; border: 1px solid #f1f5f9; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .stat-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
        .icon-green { background: #dcfce7; color: #16a34a; }
        .icon-blue { background: #dbeafe; color: #2563eb; }
        .icon-orange { background: #ffedd5; color: #ea580c; }
        
        .stat-value { font-size: 2.5rem; font-weight: 800; color: #0f172a; margin-bottom: 4px; line-height: 1; }
        .stat-label { font-size: 0.9rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .stat-available .stat-value { color: #10b981; }
        .stat-full .stat-value { color: #ef4444; }
        
        .btn-action { width: 100%; padding: 16px; background: #10b981; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s; margin-top: 24px; box-shadow: 0 4px 10px rgba(16,185,129,0.2); }
        .btn-action:hover { background: #059669; box-shadow: 0 6px 15px rgba(16,185,129,0.3); transform: translateY(-2px); }
        .btn-disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; box-shadow: none; }
        .btn-disabled:hover { background: #cbd5e1; box-shadow: none; transform: none; }
        
        .live-pulse { position: absolute; top: 32px; right: 32px; width: 12px; height: 12px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); animation: pulsered 2s infinite; }
        
        @keyframes pulsered {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        
        #errorMsg { text-align: center; color: #ef4444; font-weight: 600; padding: 40px; font-size: 1.1rem; display: none; }
    </style>
</head>
<body>

    <header class="dash-header-web">
        <div class="header-content">
            <a href="user_dinein.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="page-title" id="headerTitle">Live Status</h1>
        </div>
    </header>

    <main class="web-container">
        <div id="errorMsg">Hotel data not found. Please go back.</div>
        
        <div class="status-card" id="statusContainer" style="display: none; position: relative;">
            <div class="live-pulse"></div>
            
            <h2 class="hotel-name" id="displayHotelName">Hotel Name</h2>
            <p class="hotel-address">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span id="displayHotelAddress">Address</span>
            </p>
            
            <div class="stats-grid">
                <div class="stat-box" id="availableBox">
                    <div class="stat-icon icon-green">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M16 21v-2a4 4 0 0 0-4-4H5.5M16 3.13a4 4 0 0 1 0 7.75"></path><path d="M9 21v-2a4 4 0 0 1 4-4"></path><circle cx="8.5" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="stat-value" id="valAvailable">0</div>
                    <div class="stat-label">Available Seats</div>
                </div>
                
                <div class="stat-box">
                    <div class="stat-icon icon-blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <div class="stat-value" id="valOccupied">0/0</div>
                    <div class="stat-label">Currently Occupied</div>
                </div>
                
                <div class="stat-box">
                    <div class="stat-icon icon-orange">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div class="stat-value" id="valWait">0m</div>
                    <div class="stat-label">Max Clear Time</div>
                </div>
            </div>
            
            <button class="btn-action" id="btnAction" onclick="alert('Seat reserving functionality coming soon!')">Reserve a Seat</button>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user_dashboard.html" class="nav-item user-nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="user_orders.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span>Orders</span>
        </a>
        <a href="user_alerts.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span>Alerts</span>
        </a>
        <a href="user_settings.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!SessionManager.isLoggedIn()) {
                window.location.href = 'login_user.html';
                return;
            }

            const dataStr = sessionStorage.getItem('currentDineInHotel');
            if (!dataStr) {
                document.getElementById('errorMsg').style.display = 'block';
                return;
            }

            const hotelData = JSON.parse(dataStr);
            
            document.getElementById('headerTitle').textContent = hotelData.hotel_name || "Live Status";
            document.getElementById('displayHotelName').textContent = hotelData.hotel_name || "Hotel Name";
            document.getElementById('displayHotelAddress').textContent = hotelData.hotel_address || "Location unavailable";
            
            const remaining = parseInt(hotelData.remaining);
            const isFull = remaining <= 0;
            
            document.getElementById('valAvailable').textContent = isFull ? 'FULL' : remaining;
            document.getElementById('valOccupied').textContent = `${hotelData.in_use}/${hotelData.total_places}`;
            document.getElementById('valWait').textContent = `${hotelData.max_clear_time_mins}m`;
            
            if (isFull) {
                document.getElementById('availableBox').classList.add('stat-full');
                const btn = document.getElementById('btnAction');
                btn.classList.add('btn-disabled');
                btn.textContent = 'Seats Full';
                btn.onclick = (e) => e.preventDefault();
            } else {
                document.getElementById('availableBox').classList.add('stat-available');
            }
            
            document.getElementById('statusContainer').style.display = 'block';
        });
    </script>
</body>
</html>
