<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Delivery Partner Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-card">
        <!-- Top Area with Icon -->
        <div class="auth-top-image" style="background: linear-gradient(180deg, #ffedd5 0%, #fef8f1 100%);">
            <div class="auth-icon-badge" style="background: white; border: 2px solid #ea580c;">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 32px; height: 32px;">
                    <circle cx="5.5" cy="17.5" r="3.5"></circle>
                    <circle cx="18.5" cy="17.5" r="3.5"></circle>
                    <path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"></path>
                </svg>
            </div>
        </div>

        <!-- Content -->
        <div class="auth-content">
            <h1 class="auth-title" style="color: #0f172a;">Delivery Partner</h1>
            <p class="auth-subtitle">Login to start delivering and earning</p>

            <form class="auth-form" id="loginForm">
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <div class="auth-options">
                    <a href="forgot_password.html" class="forgot-link" onclick="localStorage.setItem('resetRole', 'delivery');" style="color: #ea580c; font-size: 0.9rem; font-weight: 600; text-decoration: none; margin-left: auto;">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn" style="background: #ea580c; box-shadow: 0 4px 15px rgba(234, 88, 12, 0.3); margin-top: 16px;" id="btnSubmit">Login</button>
            </form>

            <p class="auth-footer" style="margin-top: 30px;">
                Want to join us? <a href="register_delivery.html" style="color: #ea580c; font-weight: 700; text-decoration: none;">Apply Now</a>
            </p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            const data = {
                role: 'delivery',
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const response = await apiCall('login.php', data);
            
            if (response.status === 'success') {
                SessionManager.login(response.data);
                window.location.href = 'delivery_dashboard.html';
            } else {
                showToast(response.message, true);
                btn.textContent = 'Login';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
