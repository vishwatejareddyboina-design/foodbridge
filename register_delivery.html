<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Become a Rider</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for Delivery Registration */
        .vehicle-type-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .vehicle-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            text-align: center;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vehicle-btn.active {
            border-color: #ea580c;
            color: #ea580c;
            background: #fff7ed;
        }
        .vehicle-label {
            font-size: 0.9rem;
            color: #1e293b;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: left;
            display: block;
        }
    </style>
</head>
<body class="auth-body">

    <div class="auth-card">
        <!-- Top Image Area -->
        <div class="auth-top-image" style="background-image: url('https://images.unsplash.com/photo-1518174780650-706b8bd7c1e5?auto=format&fit=crop&q=80&w=1000');">
            <div class="auth-top-gradient"></div>
            <div class="auth-icon-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle>
                </svg>
            </div>
        </div>

        <!-- Content Area -->
        <div class="auth-content register-content">
            <div style="display: flex; align-items: center; margin-bottom: 24px;">
                <button class="back-btn" onclick="window.history.back()" style="margin-right: 16px; position: relative;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h1 class="auth-title" style="margin-bottom: 0;">Become a Rider</h1>
            </div>

            <form class="auth-form" id="registerForm">
                
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="fullName" placeholder="Full Name" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    <input type="tel" id="phone" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"></path></svg>
                    <input type="text" id="vehicle" placeholder="Vehicle Type (e.g. Bike, Scooter)" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    <input type="text" id="license" placeholder="Driving License Number" required>
                </div>

                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password" placeholder="Password" required>
                </div>

                <button type="submit" class="auth-btn" style="margin-top: 20px;" id="btnSubmit">Create Account</button>
            </form>
            
            <p class="auth-footer" style="margin-top: 30px;">
                Already have an account? <a href="login_delivery.html" class="signup-link" style="color: #ea580c;">Login</a>
            </p>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = 'Creating Account...';
            btn.disabled = true;

            const vehicle = document.getElementById('vehicle').value;
            const license = document.getElementById('license').value;

            const data = {
                role: 'delivery',
                full_name: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                vehicle_details: vehicle + ' - ' + license,
                password: document.getElementById('password').value
            };

            const response = await apiCall('register.php', data);
            
            if (response.status === 'success') {
                showToast('Delivery Partner registered successfully! Please login.');
                window.location.href = 'login_delivery.html';
            } else {
                showToast(response.message, true);
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
