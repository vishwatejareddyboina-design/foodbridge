<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodBridge - Notifications</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <!-- Header -->
    <header class="dashboard-header" style="justify-content: center; text-align: center; padding-top: 30px; position: relative;">
        <h1 class="hotel-name" style="font-size: 1.5rem;">Notifications</h1>
        <button id="btnClearAll" style="position: absolute; right: 24px; top: 32px; background: transparent; border: none; color: #ef4444; font-weight: 700; font-size: 0.9rem; cursor: pointer; display: none;">Clear All</button>
    </header>

    <!-- Main Content -->
    <main class="dashboard-content" id="notificationsContainer">
        <div style="text-align: center; color: #64748b; padding: 40px; font-weight: 600;">Loading notifications...</div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="user_dashboard.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
        </a>
        <a href="user_orders.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span>Orders</span>
        </a>
        <a href="user_alerts.html" class="nav-item user-nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            <span>Alerts</span>
        </a>
        <a href="user_settings.html" class="nav-item user-nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </a>
    </nav>

    <script src="api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('notificationsContainer');
            const btnClearAll = document.getElementById('btnClearAll');
            
            async function fetchNotifications() {
                try {
                    const response = await apiCall('get_notifications.php', {});
                    if (response.status === 'success') {
                        container.innerHTML = '';
                        if (response.data.length === 0) {
                            container.innerHTML = '<div style="text-align: center; color: #64748b; padding: 60px; font-weight: 600;"><svg viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" style="width: 48px; height: 48px; margin-bottom: 16px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><br>You have no notifications.</div>';
                            btnClearAll.style.display = 'none';
                            return;
                        }
                        
                        btnClearAll.style.display = 'block';
                        response.data.forEach(notif => {
                            const date = new Date(notif.created_at).toLocaleString();
                            
                            const div = document.createElement('div');
                            div.className = 'alert-card';
                            div.style.borderColor = '#f8fafc';
                            div.style.boxShadow = '0 4px 15px rgba(0,0,0,0.03)';
                            div.innerHTML = `
                                <div class="alert-icon" style="background: #ffedd5; color: #ea580c;">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 24px; height: 24px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                                </div>
                                <div class="alert-info" style="flex: 1; position: relative;">
                                    <div style="position: absolute; right: 0; top: 4px; width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></div>
                                    <h3>Rush Hour at ${notif.hotel_name}</h3>
                                    <p>${notif.message}</p>
                                    <div class="alert-time">${date}</div>
                                </div>
                            `;
                            container.appendChild(div);
                        });
                    } else {
                        container.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 40px;">Failed to load notifications.</div>';
                    }
                } catch(e) {
                    container.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 40px;">Network error.</div>';
                }
            }

            fetchNotifications();

            btnClearAll.onclick = async () => {
                if(confirm('Clear all notifications?')) {
                    try {
                        const res = await apiCall('clear_notifications.php', {});
                        if(res.status === 'success') {
                            fetchNotifications();
                        } else {
                            showToast("Failed to clear", true);
                        }
                    } catch(e) {
                        showToast("Network error", true);
                    }
                }
            };
        });
    </script>
</body>
</html>
